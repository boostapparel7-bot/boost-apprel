<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Status Order Jersey</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #080C12;
    --green-dark: #091526;
    --green-light: #0A2140;
    --green-pale: #0A2140;
    --text: #e5e7eb;
    --text-dark: #0b1220;
    --muted-dark: #4b5563;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --bg: #f9fafb;
    --white: #ffffff;
    --radius: 12px;
    --radius-sm: 8px;

    --dp-bg: #FAEEDA; --dp-fg: #633806;
    --design-bg: #E6F1FB; --design-fg: #0C447C;
    --cetak-bg: #EEEDFE; --cetak-fg: #3C3489;
    --jahit-bg: #FAECE7; --jahit-fg: #712B13;
    --packing-bg: #FBEAF0; --packing-fg: #72243E;
    --selesai-bg: #EAF3DE; --selesai-fg: #27500A;
    --late-bg: #FEE2E2; --late-fg: #991B1B;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
    padding: 2rem 1.25rem 3.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -30px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .hero-icon {
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.18);
    border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
  }
  .hero-icon i { color: #fff; font-size: 28px; }
  .hero h1 {
    font-size: 22px; font-weight: 700; color: #fff;
    letter-spacing: -0.3px; margin-bottom: 6px;
  }
  .hero p {
    font-size: 13.5px; color: rgba(255,255,255,0.78);
    line-height: 1.5;
  }

  /* ── SEARCH CARD ── */
  .search-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 4px 24px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.06);
    padding: 1.25rem;
    margin: -1.8rem 1rem 1.25rem;
    position: relative;
    z-index: 10;
  }
  .search-label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text-muted); margin-bottom: 8px;
  }
  .search-row {
    display: flex; gap: 8px;
  }
  .search-input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--text-dark);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--green); background: var(--white); }
  .search-input::placeholder { color: #b0b7c3; }
  .search-btn {
    padding: 10px 18px;
    background: linear-gradient(135deg, #1f8cff 0%, #0f68d4 100%);
    color: #fff;
    border: none;
    border-radius: 16px;
    font-size: 13.5px; font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    box-shadow: 0 12px 24px rgba(15, 90, 235, 0.18);
  }
  .search-btn:hover {
    background: linear-gradient(135deg, #1b7ce6 0%, #0d56b5 100%);
    transform: translateY(-1px);
    box-shadow: 0 16px 28px rgba(15, 90, 235, 0.24);
  }
  .search-btn:active { transform: translateY(0); }
  .search-hint {
    font-size: 11.5px; color: var(--text-muted);
    margin-top: 8px; display: flex; gap: 14px;
  }

  /* Search button spinner + input pulse */
  .btn-spinner {
    display: none;
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.18);
    border-top-color: #fff; box-sizing: border-box;
  }
  .search-btn.loading .btn-icon { display: none; }
  .search-btn.loading .btn-spinner { display: inline-block; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(1turn); } }

  .search-input.pulse { animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0% { box-shadow: none; } 50% { box-shadow: 0 8px 20px rgba(15,120,255,0.09); } 100% { box-shadow: none; } }
  .search-hint span { display: flex; align-items: center; gap: 4px; }
  .search-hint i { font-size: 12px; }

  /* ── MAIN CONTENT ── */
  .container { padding: 0 1rem 2rem; }

  /* ── STATE: EMPTY / ERROR ── */
  .state-box {
    background: var(--white);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    border: 1px solid var(--border);
  }
  .state-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: var(--green-light);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
  }
  .state-icon i { font-size: 26px; color: var(--green); }
  .state-icon.err { background: #FEE2E2; }
  .state-icon.err i { color: #DC2626; }
  .state-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .state-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text-dark); }
  .state-sub { font-size: 13px; color: var(--muted-dark); line-height: 1.55; }

  /* ── ORDER CARD ── */
  .order-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .order-card-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  }
  .order-id {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px; font-weight: 600; color: var(--green-dark);
    background: var(--green-light);
    padding: 3px 9px; border-radius: 20px;
    display: inline-block; margin-bottom: 4px;
  }
  .order-name { font-size: 15px; font-weight: 600; color: var(--text-dark); }
  .order-meta { font-size: 12px; color: var(--muted-dark); margin-top: 2px; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 20px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
    flex-shrink: 0;
  }
  .badge i { font-size: 11px; }
  .b-dp      { background: var(--dp-bg);      color: var(--dp-fg); }
  .b-design  { background: var(--design-bg);  color: var(--design-fg); }
  .b-cetak   { background: var(--cetak-bg);   color: var(--cetak-fg); }
  .b-jahit   { background: var(--jahit-bg);   color: var(--jahit-fg); }
  .b-packing { background: var(--packing-bg); color: var(--packing-fg); }
  .b-selesai { background: var(--selesai-bg); color: var(--selesai-fg); }
  .b-late    { background: var(--late-bg);    color: var(--late-fg); }

  /* Progress Bar */
  .progress-wrap { padding: 14px 16px 0; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 11.5px; color: var(--text-muted);
    margin-bottom: 8px;
  }
  .progress-track {
    height: 6px; background: var(--bg);
    border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--green) 0%, var(--green-dark) 100%);
    transition: width 0.6s ease;
  }
  .progress-steps {
    display: flex; justify-content: space-between;
    margin-top: 8px; gap: 2px;
  }
  .progress-step {
    flex: 1; text-align: center;
    font-size: 10px; color: var(--muted-dark);
    line-height: 1.3;
  }
  .progress-step.done { color: var(--green-dark); font-weight: 600; }
  .progress-step.current { color: var(--green); font-weight: 700; }

  /* Order Details */
  .order-details {
    padding: 14px 16px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }
  .detail-item { }
  .detail-label { font-size: 11px; color: var(--muted-dark); font-weight: 500; margin-bottom: 2px; }
  .detail-val { font-size: 13.5px; font-weight: 500; color: var(--text-dark); }
  .detail-item.full { grid-column: 1 / -1; }

  /* Timeline */
  .timeline-wrap {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
  }
  .timeline-title {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text-muted); margin-bottom: 14px;
  }
  .tl { display: flex; flex-direction: column; gap: 0; }
  .tl-row { display: flex; gap: 12px; }
  .tl-left { display: flex; flex-direction: column; align-items: center; width: 28px; }
  .tl-dot {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    background: var(--white); flex-shrink: 0; z-index: 1;
  }
  .tl-dot.done { background: var(--green); border-color: var(--green); }
  .tl-dot.done i { color: #fff; }
  .tl-dot.current { background: var(--green-light); border-color: var(--green); }
  .tl-dot.current i { color: var(--green); }
  .tl-dot i { font-size: 13px; color: #c4c9d4; }
  .tl-line { flex: 1; width: 2px; background: var(--border); margin: 2px 0; min-height: 18px; }
  .tl-line.done { background: var(--green); }
  .tl-body { padding: 4px 0 20px; }
  .tl-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
  .tl-name.muted { color: var(--muted-dark); font-weight: 400; }
  .tl-desc { font-size: 12px; color: var(--muted-dark); margin-top: 2px; line-height: 1.5; }

  /* WA Button */
  .wa-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 16px;
    background: linear-gradient(135deg, #25d366 0%, #16b96a 100%);
    border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 700; cursor: pointer;
    width: 100%;
    transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    text-decoration: none;
    margin: 0 16px 16px;
    width: calc(100% - 32px);
    box-shadow: 0 14px 30px rgba(37, 211, 102, 0.22);
  }
  .wa-btn:hover {
    background: linear-gradient(135deg, #1cb95a 0%, #139955 100%);
    transform: translateY(-1px);
    box-shadow: 0 18px 34px rgba(37, 211, 102, 0.28);
  }
  .wa-btn:active { transform: translateY(0); }
  .wa-btn i { font-size: 18px; }

  /* Multiple results header */
  .results-header {
    font-size: 12px; color: var(--muted-dark);
    margin-bottom: 10px; padding: 0 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .results-count {
    background: var(--green-light);
    color: var(--green-dark);
    font-weight: 700; font-size: 11.5px;
    padding: 2px 8px; border-radius: 99px;
  }

  /* Late warning */
  .late-warning {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 12px; color: #991B1B;
    display: flex; align-items: center; gap: 8px;
    margin: 0 16px 14px;
  }
  .late-warning i { font-size: 15px; flex-shrink: 0; }

  /* Deadline chip */
  .deadline-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500;
    color: var(--text-muted);
  }
  .deadline-chip.late { color: #DC2626; }
  .deadline-chip i { font-size: 13px; }

  /* Responsive */
  @media(max-width: 480px) {
    .search-row { flex-direction: column; gap: 10px; }
    .search-input { font-size: 16px; padding: 12px 14px; }
    .search-btn {
      width: 100%;
      padding: 14px 18px;
      font-size: 16px;
      border-radius: 14px;
      box-shadow: 0 16px 32px rgba(15,90,235,0.18);
    }
    .search-btn .btn-icon i { font-size: 17px; }
    .order-details { grid-template-columns: 1fr; gap: 14px; }
    .order-card { margin: 0 8px 12px; }
    .state-box { padding: 20px 12px; }
    .wa-btn {
      padding: 14px 18px;
      font-size: 16px;
      margin: 0 12px 16px;
      width: calc(100% - 24px);
      box-shadow: 0 18px 36px rgba(37,211,102,0.24);
      border-radius: 12px;
    }
    .progress-step { font-size: 11px; }
    .hero { padding: 1.5rem 1rem 2.5rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-icon"><i class="ti ti-shirt"></i></div>
  <h1>Cek Status Order Jersey</h1>
  <p>Masukkan ID order atau nomor WhatsApp<br>untuk melihat progres produksi kamu</p>
</div>

<div class="search-card">
  <div class="search-label">Lacak Pesanan</div>
  <div class="search-row">
    <input class="search-input" id="search-input" type="text"
      placeholder="Contoh: JR-007 atau 08123456789"
      autocomplete="off" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter') cekOrder()">
    <button class="search-btn" id="search-btn" onclick="cekOrder()" aria-label="Cari">
      <span class="btn-icon"><i class="ti ti-search" style="font-size:15px"></i></span>
      <span class="btn-spinner" aria-hidden="true"></span>
    </button>
  </div>
  <div class="search-hint">
    <span><i class="ti ti-hash"></i> ID Order (JR-XXX)</span>
    <span><i class="ti ti-device-mobile"></i> Nomor WA</span>
  </div>
</div>

<div class="container">
  <div id="result-area">
    <!-- Default state -->
    <div class="state-box" id="state-welcome">
      <div class="state-icon"><i class="ti ti-map-search"></i></div>
      <div class="state-title">Temukan pesanan kamu</div>
      <div class="state-sub">Ketik ID order atau nomor WhatsApp<br>yang kamu daftarkan saat pesan jersey.</div>
    </div>
  </div>
</div>

<script>
// ─── DATA (sama seperti admin, dalam produksi bisa fetch dari API) ───
const STAGES = ['DP','Design','Cetak','Jahit','Packing','Selesai'];
const STAGE_ICONS = ['ti-currency-dollar','ti-pencil','ti-printer','ti-needle-thread','ti-package','ti-check'];
const STAGE_DESC = {
  'DP':      'Menunggu konfirmasi uang muka',
  'Design':  'Tim desainer sedang mengerjakan layout jersey',
  'Cetak':   'Desain disetujui, masuk antrian cetak',
  'Jahit':   'Bahan dicetak, sedang proses jahit',
  'Packing': 'Jersey selesai dijahit, sedang dikemas',
  'Selesai': 'Jersey siap diambil atau dikirim! 🎉'
};
const BADGE_CLASS = {
  'DP':'b-dp','Design':'b-design','Cetak':'b-cetak',
  'Jahit':'b-jahit','Packing':'b-packing','Selesai':'b-selesai'
};

// Nomor WhatsApp Boost Apparel (sesuai input pengguna)
const BOOST_WA = '6281525784723';

// URL Apps Script Web App (sumber data live dari Google Sheets)
const API_URL = 'https://script.google.com/macros/s/AKfycbyyHi8j9Zy3PmRv-vqZEtVEWMN2PNObnsyf1Cmbn525iBTHsFNnjU7_HVMW7Efpy8QqEQ/exec';

let orders = [];
let dataLoaded = false;
let dataError = false;

async function loadOrders() {
  try {
    const res = await fetch(`${API_URL}?action=getOrders`);
    const json = await res.json();
    if (json.success && json.orders) {
      orders = json.orders.map(o => ({
        id: o.ID,
        nama: o.Nama,
        wa: String(o.WhatsApp||''),
        qty: Number(o.Qty)||0,
        jenis: o.Jenis,
        harga: o.Harga,
        deadline: o.Deadline,
        status: o.Status,
        catatan: o.Catatan
      }));
      dataLoaded = true;
    } else {
      dataError = true;
    }
  } catch(e) {
    dataError = true;
  }
}

// ─── SEARCH ───
function startSearchAnim() {
  const btn = document.getElementById('search-btn');
  const input = document.getElementById('search-input');
  if (btn) { btn.classList.add('loading'); btn.disabled = true; }
  if (input) { input.classList.add('pulse'); input.disabled = true; }
}

function stopSearchAnim() {
  const btn = document.getElementById('search-btn');
  const input = document.getElementById('search-input');
  if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
  if (input) { input.classList.remove('pulse'); input.disabled = false; }
}

async function cekOrder() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) { showError('Masukkan ID order atau nomor WhatsApp dulu ya.'); return; }

  startSearchAnim();

  if (!dataLoaded) {
    await loadOrders();
  }

  if (dataError) {
    stopSearchAnim();
    showError('Gagal memuat data order. Coba lagi nanti atau hubungi kami via WhatsApp.');
    return;
  }

  const qClean = q.replace(/\s|-/g,'').toLowerCase();
  const results = orders.filter(o => {
    const idMatch = o.id.replace('-','').toLowerCase() === qClean || o.id.toLowerCase() === q.toLowerCase();
    const waMatch = o.wa.replace(/\s/g,'') === q.replace(/\s/g,'');
    return idMatch || waMatch;
  });

  const area = document.getElementById('result-area');
  if (results.length === 0) {
    stopSearchAnim();
    showError('Order tidak ditemukan. Coba cek kembali ID order atau nomor WA kamu.');
    return;
  }

  let html = '';
  if (results.length > 1) {
    html += `<div class="results-header">
      <span class="results-count">${results.length}</span>
      order ditemukan dengan nomor tersebut
    </div>`;
  }
  results.forEach(o => { html += buildCard(o); });
  area.innerHTML = html;
  stopSearchAnim();
}

function showError(msg) {
  document.getElementById('result-area').innerHTML = `
    <div class="state-box">
      <div class="state-icon err"><i class="ti ti-search-off"></i></div>
      <div class="state-title">Tidak ditemukan</div>
      <div class="state-sub">${msg}</div>
    </div>`;
}

// ─── BUILD CARD ───
function buildCard(o) {
  const stageIdx = STAGES.indexOf(o.status);
  const pct = Math.round(((stageIdx + 1) / STAGES.length) * 100);
  const now = new Date();
  const dl = new Date(o.deadline);
  const isLate = o.status !== 'Selesai' && dl < now;
  const dlStr = dl.toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'});

  // Badge
  const badgeCls = isLate ? 'b-late' : (BADGE_CLASS[o.status] || 'b-dp');
  const badgeIcon = isLate ? 'ti-alert-triangle' : STAGE_ICONS[stageIdx];
  const badgeLabel = isLate ? 'Terlambat' : o.status;

  // Timeline
  let tlHtml = '';
  STAGES.forEach((s, i) => {
    const isDone = i < stageIdx;
    const isCur  = i === stageIdx;
    const isLast = i === STAGES.length - 1;
    const dotCls = isDone ? 'done' : (isCur ? 'current' : '');
    const lineCls = isDone ? 'done' : '';
    const nameCls = (isDone || isCur) ? '' : 'muted';
    tlHtml += `
      <div class="tl-row">
        <div class="tl-left">
          <div class="tl-dot ${dotCls}">
            <i class="ti ${isDone ? 'ti-check' : STAGE_ICONS[i]}"></i>
          </div>
          ${!isLast ? `<div class="tl-line ${lineCls}"></div>` : ''}
        </div>
        <div class="tl-body">
          <div class="tl-name ${nameCls}">${s}</div>
          ${isCur ? `<div class="tl-desc">${STAGE_DESC[s]}</div>` : ''}
          ${isDone && i === 0 ? `<div class="tl-desc" style="color:var(--green-dark)">✓ Selesai</div>` : ''}
        </div>
      </div>`;
  });

  // Late warning
  const lateHtml = isLate ? `
    <div class="late-warning">
      <i class="ti ti-alert-circle"></i>
      Deadline sudah terlewat — mohon hubungi kami untuk update jadwal.
    </div>` : '';

  // WA button (ke nomor toko, bukan nomor pelanggan — ganti sesuai kebutuhan)
  const waText = encodeURIComponent(`Halo, saya ingin menanyakan status order ${o.id} atas nama ${o.nama}. Saat ini berstatus "${o.status}". Mohon infonya ya 🙏`);
  const waHref = `https://wa.me/${BOOST_WA}?text=${waText}`;

  return `
  <div class="order-card">
    <div class="order-card-header">
      <div>
        <div class="order-id">${o.id}</div>
        <div class="order-name">${o.nama}</div>
        <div class="order-meta">${o.qty} pcs · ${o.jenis}</div>
      </div>
      <span class="badge ${badgeCls}">
        <i class="ti ${badgeIcon}"></i>${badgeLabel}
      </span>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Progress Produksi</span>
        <span style="font-weight:600;color:var(--green-dark)">${pct}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-steps">
        ${STAGES.map((s,i) => {
          const cls = i < stageIdx ? 'done' : (i === stageIdx ? 'current' : '');
          return `<div class="progress-step ${cls}">${s}</div>`;
        }).join('')}
      </div>
    </div>

    <div class="order-details">
      <div class="detail-item">
        <div class="detail-label">Total Harga</div>
        <div class="detail-val">Rp ${o.harga}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Deadline</div>
        <div class="detail-val">
          <span class="deadline-chip ${isLate ? 'late' : ''}">
            <i class="ti ti-calendar"></i>${dlStr}
          </span>
        </div>
      </div>
      <div class="detail-item full">
        <div class="detail-label">Catatan Desain</div>
        <div class="detail-val" style="font-weight:400;color:var(--text-muted);font-size:12.5px">${o.catatan || '—'}</div>
      </div>
    </div>

    <div class="timeline-wrap">
      <div class="timeline-title">Alur Produksi</div>
      <div class="tl">${tlHtml}</div>
    </div>

    ${lateHtml}

    <a class="wa-btn" href="${waHref}" target="_blank">
      <i class="ti ti-brand-whatsapp"></i>
      Hubungi Kami via WhatsApp
    </a>
  </div>`;
}
</script>
</body>
</html>
